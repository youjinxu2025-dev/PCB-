<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号中心 | 审图工坊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell inner-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-badge">PCB</span>
        <span>
          <strong>审图工坊</strong>
          <small>统一账号入口</small>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html">前台首页</a>
        <a href="payment.html">支付入口</a>
        <a href="admin.html">后台管理</a>
      </nav>
    </header>

    <main class="section auth-shell">
      <div class="section-heading reveal visible auth-center-head">
        <p class="eyebrow">账号中心</p>
        <h2>合成一个入口更清晰。一个卡片里完成登录、注册和找回密码，用户不容易走错。</h2>
      </div>

      <section class="glass-panel auth-card reveal visible">
        <div class="auth-mode-switch" role="tablist" aria-label="账号模式切换">
          <button class="auth-mode-btn active" data-mode="login" type="button">密码登录</button>
          <button class="auth-mode-btn" data-mode="register" type="button">手机注册</button>
          <button class="auth-mode-btn" data-mode="reset" type="button">找回密码</button>
        </div>

        <div class="auth-pane active" id="loginPane">
          <div class="panel-head auth-pane-head">
            <h3>密码登录</h3>
            <span>已注册用户直接输入手机号和密码</span>
          </div>
          <div class="form-grid">
            <label>
              <span>手机号</span>
              <input id="loginPhone" type="tel" placeholder="请输入注册手机号">
            </label>
            <label>
              <span>登录密码</span>
              <input id="loginPassword" type="password" placeholder="请输入登录密码">
            </label>
          </div>
          <div class="action-row">
            <button class="button button-primary" id="loginBtn" type="button">立即登录</button>
            <button class="button button-secondary" id="logoutBtn" type="button">退出登录</button>
          </div>
          <div class="mini-note">
            登录成功后，首页右上角会显示当前账号状态。提交订单时，系统会自动绑定当前手机号账号。
          </div>
        </div>

        <div class="auth-pane" id="registerPane">
          <div class="panel-head auth-pane-head">
            <h3>手机注册</h3>
            <span>新客户先验证手机号，再设置登录密码</span>
          </div>
          <div class="form-grid">
            <label>
              <span>姓名或称呼</span>
              <input id="registerName" type="text" placeholder="例如：张工 / 李工 / 王经理">
            </label>
            <label>
              <span>手机号</span>
              <input id="registerPhone" type="tel" placeholder="请输入 11 位手机号">
            </label>
          </div>
          <div class="auth-inline">
            <label class="auth-inline-field">
              <span>短信验证码</span>
              <input id="registerCode" type="text" inputmode="numeric" maxlength="6" placeholder="请输入 6 位验证码">
            </label>
            <button class="button button-secondary" id="sendCodeBtn" type="button">获取验证码</button>
          </div>
          <div class="form-grid">
            <label>
              <span>设置登录密码</span>
              <input id="registerPassword" type="password" placeholder="建议 6 位以上，便于后续直接登录">
            </label>
            <label>
              <span>确认密码</span>
              <input id="registerPasswordConfirm" type="password" placeholder="再次输入登录密码">
            </label>
          </div>
          <ul class="card-list compact-list">
            <li>注册完成后可直接下单、上传工程文件、提交付款并查看订单状态。</li>
            <li>当前版本默认带演示短信模式，正式上线时可切换阿里云短信发送。</li>
          </ul>
          <div class="action-row">
            <button class="button button-primary" id="registerBtn" type="button">验证并注册账号</button>
          </div>
        </div>

        <div class="auth-pane" id="resetPane">
          <div class="panel-head auth-pane-head">
            <h3>找回密码</h3>
            <span>通过短信验证码重设登录密码</span>
          </div>
          <div class="form-grid">
            <label>
              <span>手机号</span>
              <input id="resetPhone" type="tel" placeholder="请输入已注册手机号">
            </label>
            <label>
              <span>短信验证码</span>
              <input id="resetCode" type="text" inputmode="numeric" maxlength="6" placeholder="请输入找回验证码">
            </label>
          </div>
          <div class="auth-inline">
            <label class="auth-inline-field">
              <span>新密码</span>
              <input id="resetPassword" type="password" placeholder="请输入新密码">
            </label>
            <button class="button button-secondary" id="sendResetCodeBtn" type="button">发送找回码</button>
          </div>
          <label>
            <span>确认新密码</span>
            <input id="resetPasswordConfirm" type="password" placeholder="再次输入新密码">
          </label>
          <div class="action-row">
            <button class="button button-primary" id="resetPasswordBtn" type="button">重置密码</button>
          </div>
        </div>
      </section>

      <div class="status-box auth-status" id="authMessage">等待登录、注册或找回密码。</div>
    </main>
  </div>

  <script src="auth.js"></script>
</body>
</html>
