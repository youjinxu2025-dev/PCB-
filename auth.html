<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 | 审图工坊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell inner-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-badge">PCB</span>
        <span>
          <strong>审图工坊</strong>
          <small>登录 / 注册</small>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html">前台首页</a>
        <a href="payment.html">支付入口</a>
        <a href="admin.html">后台管理</a>
      </nav>
    </header>

    <main class="section">
      <div class="section-heading reveal visible">
        <p class="eyebrow">账号中心</p>
        <h2>先完成注册登录，再提交订单、上传工程文件和查看后续流程</h2>
      </div>

      <div class="panel-grid auth-grid">
        <section class="glass-panel reveal visible">
          <div class="panel-head">
            <h3>注册账号</h3>
            <span>适合第一次使用的新客户</span>
          </div>
          <div class="form-grid">
            <label>
              <span>姓名</span>
              <input id="registerName" type="text" placeholder="例如：张工 / 李工">
            </label>
            <label>
              <span>邮箱</span>
              <input id="registerEmail" type="email" placeholder="例如：user@example.com">
            </label>
            <label>
              <span>手机号</span>
              <input id="registerPhone" type="text" placeholder="例如：13800138000">
            </label>
            <label>
              <span>密码</span>
              <input id="registerPassword" type="password" placeholder="至少 6 位">
            </label>
          </div>
          <ul class="card-list">
            <li>注册后可直接下单、上传文件、查看支付和后台状态</li>
            <li>建议用常用邮箱注册，方便后续订单通知</li>
          </ul>
          <button class="button button-primary full" id="registerBtn" type="button">注册账号</button>
        </section>

        <section class="glass-panel reveal visible">
          <div class="panel-head">
            <h3>用户登录</h3>
            <span>已有账号可直接继续下单</span>
          </div>
          <div class="form-grid">
            <label>
              <span>邮箱</span>
              <input id="loginEmail" type="email" placeholder="请输入注册邮箱">
            </label>
            <label>
              <span>密码</span>
              <input id="loginPassword" type="password" placeholder="请输入密码">
            </label>
          </div>
          <div class="action-row">
            <button class="button button-primary" id="loginBtn" type="button">登录</button>
            <button class="button button-secondary" id="logoutBtn" type="button">退出登录</button>
          </div>
          <div class="mini-note">
            登录成功后，首页右上角会显示已登录状态，下单时会自动绑定当前账号。
          </div>
        </section>
      </div>

      <div class="status-box auth-status" id="authMessage">等待注册或登录</div>
    </main>
  </div>

  <script src="auth.js"></script>
</body>
</html>
